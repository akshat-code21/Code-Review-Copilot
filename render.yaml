databases:
  - name: code-review-db
    databaseName: code_review
    user: postgres
    plan: free

services:
  # Redis instance for Celery queue and backend caching
  - type: redis
    name: code-review-redis
    plan: free
    ipAllowList: [] # Only allow internal connections from our backend services

  # FastAPI Web Service
  - type: web
    name: code-review-web
    env: docker
    plan: free
    releaseCommand: "uv run alembic upgrade head" # Automatically apply DB migrations on deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render will generate a cryptographically secure random value
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false # You will input this manually in the Render dashboard
      - key: GITHUB_TOKEN
        sync: false # You will input this manually in the Render dashboard

  # Celery Background Worker
  - type: worker
    name: code-review-worker
    env: docker
    plan: free
    dockerCommand: "uv run celery -A app.tasks.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: code-review-web
          property: SECRET_KEY # Share the generated secret key with the worker
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: code-review-web
          property: OPENAI_API_KEY # Share API keys between web and worker
      - key: GITHUB_TOKEN
        fromService:
          type: web
          name: code-review-web
          property: GITHUB_TOKEN
