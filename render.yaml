envVarGroups:
  - name: code-review-shared-env
    envVars:
      - key: SECRET_KEY
        generateValue: true # Render will generate a cryptographically secure random value
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_API_KEY
        sync: false # You will input this manually in the Render dashboard
      - key: GITHUB_TOKEN
        sync: false # You will input this manually in the Render dashboard

databases:
  - name: code-review-db
    plan: free

services:
  # Redis instance for Celery queue and backend caching
  - type: redis
    name: code-review-redis
    plan: free
    ipAllowList: [] # Only allow internal connections from our backend services

  # FastAPI Web Service
  - type: web
    name: code-review-web
    env: docker
    plan: free
    dockerCommand: "uv run alembic upgrade head && uv run uvicorn app.main:app --port 8000 --host 0.0.0.0"
    envVars:
      - fromGroup: code-review-shared-env
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString

  # Celery Background Worker
  - type: worker
    name: code-review-worker
    env: docker
    plan: free
    dockerCommand: "uv run celery -A app.tasks.celery_app worker --loglevel=info"
    envVars:
      - fromGroup: code-review-shared-env
      - key: DATABASE_URL
        fromDatabase:
          name: code-review-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: code-review-redis
          property: connectionString
